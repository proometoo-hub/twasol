services:
  - type: web
    name: tawasol
    env: docker
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: TRUST_PROXY
        value: 1
      - key: BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MEDIA_SECRET
        sync: false
      - key: MAX_UPLOAD_MB
        value: 80
      - key: MEDIA_LINK_TTL_SEC
        value: 86400
